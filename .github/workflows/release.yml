name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build App
        run: xcodebuild -scheme MCSC -configuration Release build

      - name: Zip App
        run: |
          cd build/Release
          zip -r MCSC.zip MCSC.app

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release/MCSC.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
